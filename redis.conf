# Redis configuration for transient caching
# Optimized for high-throughput, short-lived data

# Disable persistence (RDB and AOF) since this is a transient cache
save ""
appendonly no

# Memory management
# Set a limit suitable for your host environment (e.g., 512mb or 1gb)
maxmemory 512mb
# Evict the least recently used keys when maxmemory is reached
maxmemory-policy allkeys-lru

# Networking
# Listen on all interfaces so the container is reachable within the Docker network
bind 0.0.0.0
protected-mode no
